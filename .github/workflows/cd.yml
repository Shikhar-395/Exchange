name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/nagmani001/exchange

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      engine: ${{ steps.filter.outputs.engine }}
      db-processor: ${{ steps.filter.outputs.db-processor }}
      websocket: ${{ steps.filter.outputs.websocket }}
      market-maker: ${{ steps.filter.outputs.market-maker }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'packages/database/**'
              - 'packages/common/**'
              - 'packages/email/**'
              - 'docker/backend/**'
            engine:
              - 'apps/engine/**'
              - 'packages/database/**'
              - 'packages/common/**'
              - 'docker/engine/**'
            db-processor:
              - 'apps/db-processor/**'
              - 'packages/common/**'
              - 'packages/database/**'
              - 'docker/db-processor/**'
            websocket:
              - 'apps/websocket/**'
              - 'packages/common/**'
              - 'docker/websocket/**'
            market-maker:
              - 'apps/market-maker/**'
              - 'docker/market-maker/**'
            web:
              - 'apps/web/**'
              - 'packages/ui/**'
              - 'packages/common/**'
              - 'docker/web/**'

  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/backend:latest

  build-engine:
    needs: changes
    if: needs.changes.outputs.engine == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push engine
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/engine/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/engine:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/engine:latest

  build-db-processor:
    needs: changes
    if: needs.changes.outputs.db-processor == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push db-processor
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/db-processor/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/db-processor:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/db-processor:latest

  build-websocket:
    needs: changes
    if: needs.changes.outputs.websocket == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push websocket
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/websocket/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/websocket:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/websocket:latest

  build-market-maker:
    needs: changes
    if: needs.changes.outputs.market-maker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push market-maker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/market-maker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/market-maker:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/market-maker:latest

  build-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build web via compose (uses inline build.args)
        run: |
          docker compose -f docker/compose-files/docker-compose-deploy.yml build web
          docker tag ghcr.io/nagmani001/exchange/web:latest ghcr.io/nagmani001/exchange/web:${{ github.sha }}
          docker push ghcr.io/nagmani001/exchange/web:latest
          docker push ghcr.io/nagmani001/exchange/web:${{ github.sha }}

  start-auxiliary:
    needs: changes
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy auxiliary compose to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: docker/compose-files/docker-compose-auxilary-services.yml
          target: /home/${{ secrets.SSH_USERNAME }}/exchange/
          strip_components: 2

      - name: Start auxiliary services and wait for health
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd /home/${{ secrets.SSH_USERNAME }}/exchange
            docker compose -f docker-compose-auxilary-services.yml up -d
            until docker exec database pg_isready -U postgres; do sleep 2; done
            until docker exec timescaledb pg_isready -U exchange; do sleep 2; done

  migrate:
    needs:
      - start-auxiliary
      - build-backend
      - build-engine
      - build-db-processor
      - build-websocket
      - build-market-maker
      - build-web
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prisma generate + migrate deploy
        working-directory: packages/database
        env:
          DATABASE_URL: postgresql://postgres:nagmani@13.53.71.160:5432/postgres
        run: |
          pnpm exec prisma generate
          pnpm exec prisma migrate deploy

      - name: Seed Postgres markets
        working-directory: packages/database
        env:
          DATABASE_URL: postgresql://postgres:nagmani@13.53.71.160:5432/postgres
        run: pnpm exec tsx src/seed.ts

      - name: Init TimescaleDB schema
        working-directory: apps/db-processor
        env:
          DATABASE_URL: postgresql://postgres:nagmani@13.53.71.160:5432/postgres
          TIMESCALE_USER: exchange
          TIMESCALE_HOST: 13.53.71.160
          TIMESCALE_DATABASE: exchange
          TIMESCALE_PASSWORD: nagmani
          TIMESCALE_PORT: "5433"
        run: pnpm exec tsx src/seedTimescale.ts

  deploy:
    needs: migrate
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: docker/compose-files/docker-compose-deploy.yml
          target: /home/${{ secrets.SSH_USERNAME }}/exchange/
          strip_components: 2

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd /home/${{ secrets.SSH_USERNAME }}/exchange

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose -f docker-compose-deploy.yml pull

            docker compose -f docker-compose-deploy.yml up -d --no-deps backend
            docker compose -f docker-compose-deploy.yml up -d --no-deps engine
            docker compose -f docker-compose-deploy.yml up -d --no-deps db-processor
            docker compose -f docker-compose-deploy.yml up -d --no-deps websocket
            docker compose -f docker-compose-deploy.yml up -d --no-deps market-maker
            docker compose -f docker-compose-deploy.yml up -d --no-deps web

            sleep 10
            curl -f --retry 3 --retry-delay 2 http://localhost:3001/health || exit 1
            curl -f --retry 3 --retry-delay 2 http://localhost:3000 || exit 1

            docker image prune -f
