services:
  redis:
    image: redis
    container_name: redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg12
    container_name: timescaledb
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: exchange
      POSTGRES_USER: exchange
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-change-me}
    volumes:
      - timescale-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exchange -d exchange"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ${IMAGE_PREFIX:-ghcr.io/shikhar/exchange}/backend:${IMAGE_TAG:-latest}
    container_name: backend
    restart: always
    ports:
      - "4001:4001"
    env_file:
      - .env.backend
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy

  engine:
    image: ${IMAGE_PREFIX:-ghcr.io/shikhar/exchange}/engine:${IMAGE_TAG:-latest}
    container_name: engine
    restart: always
    env_file:
      - .env.engine
    volumes:
      - engine-data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  db-processor:
    image: ${IMAGE_PREFIX:-ghcr.io/shikhar/exchange}/db-processor:${IMAGE_TAG:-latest}
    container_name: db-processor
    restart: always
    env_file:
      - .env.db-processor
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy

  websocket:
    image: ${IMAGE_PREFIX:-ghcr.io/shikhar/exchange}/websocket:${IMAGE_TAG:-latest}
    container_name: websocket
    restart: always
    ports:
      - "4002:3002"
    env_file:
      - .env.websocket
    depends_on:
      redis:
        condition: service_healthy

  market-maker:
    image: ${IMAGE_PREFIX:-ghcr.io/shikhar/exchange}/market-maker:${IMAGE_TAG:-latest}
    container_name: market-maker
    restart: always
    env_file:
      - .env.market-maker
    depends_on:
      - backend

  web:
    image: ${IMAGE_PREFIX:-ghcr.io/shikhar/exchange}/web:${IMAGE_TAG:-latest}
    container_name: web
    restart: always
    ports:
      - "4000:3000"
    env_file:
      - .env.web
    build:
      context: ../..
      dockerfile: docker/web/Dockerfile
      args:
        NEXT_PUBLIC_EXCHANGE_API_URL: ${NEXT_PUBLIC_EXCHANGE_API_URL:-https://api.exchange.shikhar.site/api/v1}
        NEXT_PUBLIC_EXCHANGE_WS_URL: ${NEXT_PUBLIC_EXCHANGE_WS_URL:-wss://ws.exchange.shikhar.site}

volumes:
  redis-data:
  timescale-data:
  engine-data:
